<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAY Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 히어로 섹션 -->
  <header class="hero">
    <div class="hero-inner">
      <span class="badge">Portfolio</span>
      <h1>JAY</h1>
      <p class="subtitle">풀스택 개발자 · Python · JavaScript · React</p>
      <div class="hero-links">
        <a href="https://github.com/" target="_blank">GitHub</a>
        <a href="https://linkedin.com/" target="_blank">LinkedIn</a>
        <a href="mailto:your@email.com">이메일</a>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- 기술 스택 -->
    <section class="section">
      <h2 class="section-title">기술 스택</h2>
      <div class="pills">
        <span class="pill">Python</span>
        <span class="pill">Flask</span>
        <span class="pill">JavaScript</span>
        <span class="pill">React</span>
        <span class="pill">HTML / CSS</span>
        <span class="pill">Vercel</span>
        <span class="pill">SQL</span>
      </div>
    </section>

    <!-- 프로젝트 -->
    <section class="section">
      <h2 class="section-title">프로젝트</h2>

      <div class="add-bar">
        <input id="title" type="text" placeholder="프로젝트 이름" />
        <input id="desc" type="text" placeholder="한 줄 설명" />
        <button onclick="addProject()">+ 추가</button>
      </div>

      <div id="list" class="cards"></div>
    </section>

  </main>

  <footer class="footer">
    <p>© 2025 JAY · Built with Flask &amp; Vercel</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
